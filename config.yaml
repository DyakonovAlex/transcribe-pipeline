# whisper.cpp настройки
whisper_cli: "~/dyak/whisper.cpp/build/bin/whisper-cli"
model_path: "~/dyak/whisper.cpp/models/ggml-large-v2.bin"
whisper_args:
  language: "ru"
  threads: 8
  beam_size: 5
  best_of: 5
  temperature: 0.0
  max_len: 1
  no_timestamps: true

# Выбор LLM-провайдера пост-обработки: ollama | gemini_cli
llm_provider: "gemini_cli"

# Ollama настройки
ollama:
  url: "http://localhost:11434/api/generate"
  model: "mistral-nemo"     # или другая модель
  reasoning_effort: "high"         # low | medium | high (опционально)
  prompt_template: "~/dyak/transcribe-pipeline/prompts/meeting_summary.txt"

# Gemini CLI настройки (используются, когда llm_provider: gemini_cli)
gemini_cli:
  binary: "gemini"
  model: "gemini-3-flash-preview"
  prompt_template: "~/dyak/transcribe-pipeline/prompts/meeting_summary.txt"
  timeout: 300
  args: []

# Файловые пути
output_dir: "/tmp/transcribe_temp"   # временные файлы WAV и транскрипта
notes_dir: "~/dyak/notes/10-meeting" # куда вставлять результат
placeholder: "{{input}}"              # что заменять в целевом файле

# Логирование
log_level: "INFO"   # DEBUG, INFO, WARNING, ERROR